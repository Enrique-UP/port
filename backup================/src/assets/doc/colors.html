<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style type="text/css">
        *{padding:0;margin:0;box-sizing: border-box;}
        ul{width: 100%;display: flex;color:#fff;}
        ul > li{list-style: none;width:100%;height: 40px;}
        hr{margin-block:24px;}        
    </style>
</head>
<body>
    <ul>
        <li style="background: indianred;">indianred</li>
        <li style="background: orange;">orange</li>
        
        <li style="background: cornflowerblue;">cornflowerblue</li>
        <li style="background: darkkhaki;">darkkhaki</li>

        <li style="background: salmon;">salmon</li>
        <li style="background: violet;">violet</li>
        
        <li style="background: royalblue;">royalblue</li>        
    </ul>
    <hr>
    <ul>
        <li style="background: #e22f45;"></li>
        <li style="background: #fbc02d;"></li>

        <li style="background: #e05a3b;"></li>
        <li style="background: #ff7a00;"></li>

        <li style="background: #00a383;"></li>
        <li style="background: #06b6d4;"></li>

        <li style="background: #d630ff;"></li>
        <li style="background: #6c5ce7;"></li>
        
        <li style="background: #8b5e3c;"></li>
        <li style="background: #34495c;"></li>
    </ul>
</body>
</html>
