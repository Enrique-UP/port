<script type="text/javascript">
   $(".filters-list li").click(function(){
       $(window).resize();
   });
//    $(document).scroll(function () {
//        $(window).resize();
//    });
   $(window).on("scroll", rsz);
   setInterval(rsz, 100);
   function rsz(){
    $(window).resize();
   }
</script>
<script type="text/javascript">
    $(".filters-list li").click(function(){
        $(".project-item").removeClass("animate heading");
        $(".project-item").css({"visibility" : "visible", "animation-name" : "none", "-webkit-animation-name" : "none", "-moz-animation-name" : "none"});
        $( window ).scroll(function() {
            $(".project-item").removeClass("animate heading");
            $(".project-item").css({"visibility" : "visible", "animation-name" : "none", "-webkit-animation-name" : "none", "-moz-animation-name" : "none"});
        });
    });        
</script>
<script type="text/javascript">
$(document).ready(function(){
  $(".quicksearch_area input").on("keyup", function() {
    $(window).resize();
    var value = $(this).val().toLowerCase();
    $(".projects-list .project-item").filter(function() {
      $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
    });
  });
});
$(document).ready(function(){
$(".quicksearch_area").click(function(e){
    e.stopPropagation();
});
});
$(document).click(function(){
    $(".quicksearch_area input").val("");
    $(".projects-list .project-item").fadeIn();
});
    </script>
